<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחק למבורגיני תלת מימד</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
      direction: rtl;
      background: #111;
      color: #fff;
    }

    #overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      left: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      padding: 12px 16px;
      min-width: 140px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    #message {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
      z-index: 8;
      font-size: 26px;
      font-weight: bold;
      padding: 20px;
      color: #f7f7f7;
      text-shadow: 0 0 14px rgba(0,0,0,0.7);
    }

    #instructions {
      text-align: center;
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: #ddd;
      pointer-events: none;
      z-index: 10;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #ff3b3b;
      color: #fff;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      pointer-events: auto;
    }

    button:hover {
      background: #ff1f1f;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div class="panel" id="scorePanel">נקודות: <span id="score">0</span></div>
    <div class="panel" id="speedPanel">מהירות: <span id="speed">0</span> קמ"ש</div>
    <div class="panel" id="statusPanel">סטטוס: <span id="status">רכיבה</span></div>
  </div>
  <div id="message">לחץ "הפעל" להתחלה</div>
  <div id="instructions">שימוש: ← / → או A / D לנתיב, ↑ / W לזרז, ↓ / S להאט</div>
  <button onclick="restartGame()" style="position:absolute;top:10px;left:10px;z-index:10;">הפעל</button>

  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
  <script>
    let scene, camera, renderer, clock;
    let playerCar, road, laneLines = [];
    let buses = [];
    let score = 0;
    let speed = 0;
    let lane = 0;
    let isGameOver = true;
    let controls = { accelerate: false, decelerate: false };
    let message = document.getElementById('message');
    let scoreEl = document.getElementById('score');
    let speedEl = document.getElementById('speed');
    let statusEl = document.getElementById('status');
    const lanePositions = [-2.6, 0, 2.6];
    const spawnInterval = 1.4;
    let spawnTimer = 0;
    let lastTime = 0;

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0f1725, 0.02);

      camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 240);
      camera.position.set(0, 6, 24);
      camera.lookAt(0, 1.2, 6);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setClearColor(0x091a2d);
      document.body.appendChild(renderer.domElement);

      const hemiLight = new THREE.HemisphereLight(0x8fbfff, 0x050520, 0.8);
      scene.add(hemiLight);

      const ambient = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
      dirLight.position.set(-4, 10, 16);
      dirLight.castShadow = false;
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0x93d7ff, 0.35);
      fillLight.position.set(5, 4, -5);
      scene.add(fillLight);

      createRoad();
      createPlayerCar();
      createEnvironment();

      clock = new THREE.Clock();
      window.addEventListener('resize', onResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keyup', onKeyUp);
    }

    function createRoad() {
      const roadGeometry = new THREE.PlaneGeometry(16, 220);
      const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x1d2330, metalness: 0.2, roughness: 0.7 });
      road = new THREE.Mesh(roadGeometry, roadMaterial);
      road.rotation.x = -Math.PI / 2;
      road.position.z = -90;
      road.receiveShadow = true;
      scene.add(road);

      const borderMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
      const leftBorder = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 220), borderMaterial);
      leftBorder.rotation.x = -Math.PI / 2;
      leftBorder.position.set(-8.4, 0.01, -90);
      scene.add(leftBorder);
      const rightBorder = leftBorder.clone();
      rightBorder.position.set(8.4, 0.01, -90);
      scene.add(rightBorder);

      const lineGeometry = new THREE.PlaneGeometry(0.18, 12);
      const lineMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
      for (let z = -4; z > -200; z -= 12) {
        const line = new THREE.Mesh(lineGeometry, lineMaterial);
        line.rotation.x = -Math.PI / 2;
        line.position.set(0, 0.02, z);
        scene.add(line);
        laneLines.push(line);
      }
    }

    function createPlayerCar() {
      playerCar = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6a00, metalness: 0.9, roughness: 0.12 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.8, 6.8), bodyMat);
      body.position.set(0, 0.8, 0);
      playerCar.add(body);

      const hood = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.35, 2.2), new THREE.MeshStandardMaterial({ color: 0xff7f11, metalness: 0.9, roughness: 0.15 }));
      hood.position.set(0, 0.95, 2.1);
      playerCar.add(hood);

      const roof = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.45, 3.0), new THREE.MeshStandardMaterial({ color: 0x0f0f14, metalness: 0.4, roughness: 0.18 }));
      roof.position.set(0, 1.1, -0.5);
      playerCar.add(roof);

      const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.6), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.25 }));
      spoiler.position.set(0, 1.0, -3.4);
      playerCar.add(spoiler);

      const leftHeadlight = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.18, 0.1), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.9 }));
      leftHeadlight.position.set(-0.9, 0.75, 3.4);
      playerCar.add(leftHeadlight);
      const rightHeadlight = leftHeadlight.clone();
      rightHeadlight.position.set(0.9, 0.75, 3.4);
      playerCar.add(rightHeadlight);

      const frontAir = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.25, 0.35), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.35 }));
      frontAir.position.set(0, 0.6, 3.0);
      playerCar.add(frontAir);

      const rear = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.35, 1.4), new THREE.MeshStandardMaterial({ color: 0x0d0d10, metalness: 0.7, roughness: 0.35 }));
      rear.position.set(0, 0.55, -3.4);
      playerCar.add(rear);

      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
      const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.45, 20);
      for (let x of [-1.4, 1.4]) {
        for (let z of [2.4, -2.2]) {
          const wheel = new THREE.Mesh(wheelGeo, wheelMat);
          wheel.rotation.z = Math.PI / 2;
          wheel.position.set(x, 0.35, z);
          playerCar.add(wheel);
        }
      }

      const nose = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.3, 1.4), new THREE.MeshStandardMaterial({ color: 0xffd200, metalness: 0.9, roughness: 0.12 }));
      nose.position.set(0, 0.65, 3.45);
      playerCar.add(nose);

      const leftAir = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.3 }));
      leftAir.position.set(-1.1, 0.6, 2.7);
      playerCar.add(leftAir);
      const rightAir = leftAir.clone();
      rightAir.position.set(1.1, 0.6, 2.7);
      playerCar.add(rightAir);

      const sideSkirtLeft = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.15, 0.6), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.7, roughness: 0.3 }));
      sideSkirtLeft.position.set(0, 0.4, 0.2);
      playerCar.add(sideSkirtLeft);

      playerCar.position.set(0, 0, 6);
      scene.add(playerCar);
    }

    function createBus() {
      const bus = new THREE.Group();
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1e90ff, metalness: 0.2, roughness: 0.65 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(4.2, 2.2, 8), bodyMat);
      body.position.set(0, 1.1, 0);
      bus.add(body);

      const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccee, metalness: 0.1, roughness: 0.6, opacity: 0.78, transparent: true });
      const windows = new THREE.Mesh(new THREE.BoxGeometry(3.8, 1.1, 1.4), windowMat);
      windows.position.set(0, 1.45, 1.1);
      bus.add(windows);

      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6 });
      const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.5, 20);
      for (let x of [-1.6, 1.6]) {
        for (let z of [2.8, -2.4]) {
          const wheel = new THREE.Mesh(wheelGeo, wheelMat);
          wheel.rotation.z = Math.PI / 2;
          wheel.position.set(x, 0.4, z);
          bus.add(wheel);
        }
      }

      const startSide = Math.random() > 0.5 ? -1 : 1;
      bus.position.set(startSide * 14, 0, -80 - Math.random() * 40);
      const targetX = lanePositions[Math.floor(Math.random() * lanePositions.length)];
      bus.userData = {
        direction: startSide * -1,
        speed: 0.8 + Math.random() * 0.8,
        targetX: targetX,
        arrived: false
      };
      scene.add(bus);
      buses.push(bus);
    }

    function createEnvironment() {
      const groundMat = new THREE.MeshStandardMaterial({ color: 0x253048, roughness: 0.96 });
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(220, 220), groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.01;
      ground.position.z = -90;
      scene.add(ground);

      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 220), new THREE.MeshStandardMaterial({ color: 0x0f1623 }));
      leftWall.position.set(-11, 2.4, -90);
      scene.add(leftWall);
      const rightWall = leftWall.clone();
      rightWall.position.set(11, 2.4, -90);
      scene.add(rightWall);

      for (let i = 0; i < 12; i++) {
        const lightPole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 5), new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.6 }));
        lightPole.position.set(-6, 2.5, -30 - i * 20);
        scene.add(lightPole);
        const lightTop = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 8), new THREE.MeshStandardMaterial({ color: 0xfff1b2, emissive: 0xfff1b2, emissiveIntensity: 0.75 }));
        lightTop.position.set(-6, 4.3, -30 - i * 20);
        scene.add(lightTop);
        const poleLight = new THREE.PointLight(0xfff1b2, 0.45, 20);
        poleLight.position.set(-6, 4.3, -30 - i * 20);
        scene.add(poleLight);

        const lightPole2 = lightPole.clone();
        lightPole2.position.set(6, 2.5, -30 - i * 20);
        scene.add(lightPole2);
        const lightTop2 = lightTop.clone();
        lightTop2.position.set(6, 4.3, -30 - i * 20);
        scene.add(lightTop2);
        const poleLight2 = new THREE.PointLight(0xfff1b2, 0.45, 20);
        poleLight2.position.set(6, 4.3, -30 - i * 20);
        scene.add(poleLight2);
      }
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onKeyDown(event) {
      if (isGameOver && event.key === 'Enter') {
        restartGame();
      }
      if (!isGameOver) {
        if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') {
          lane = Math.max(0, lane - 1);
        }
        if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') {
          lane = Math.min(2, lane + 1);
        }
        if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') {
          controls.accelerate = true;
        }
        if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') {
          controls.decelerate = true;
        }
      }
    }

    function onKeyUp(event) {
      if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') {
        controls.accelerate = false;
      }
      if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') {
        controls.decelerate = false;
      }
    }

    function restartGame() {
      if (!scene) init();
      isGameOver = false;
      score = 0;
      speed = 0;
      lane = 1;
      spawnTimer = 0;
      lastTime = 0;
      buses.forEach(bus => scene.remove(bus));
      buses = [];
      playerCar.position.set(0, 0, 6);
      playerCar.rotation.y = 0;
      controls.accelerate = false;
      controls.decelerate = false;
      message.style.display = 'none';
      statusEl.textContent = 'לחץ ↑ / W לנסוע';
      scoreEl.textContent = score;
      speedEl.textContent = speed;
      animate();
    }

    function updateRoad(delta) {
      laneLines.forEach(line => {
        line.position.z += delta * 45;
        if (line.position.z > 20) {
          line.position.z = -180;
        }
      });
    }

    function updateBuses(delta) {
      if (speed <= 0) {
        return;
      }
      spawnTimer += delta;
      if (spawnTimer > spawnInterval) {
        spawnTimer = 0;
        createBus();
      }

      buses = buses.filter(bus => {
        if (!bus.userData.arrived) {
          const moveX = bus.userData.targetX - bus.position.x;
          bus.position.x += Math.sign(moveX) * Math.min(Math.abs(moveX), delta * 6);
          if (Math.abs(moveX) < 0.2) {
            bus.userData.arrived = true;
          }
        }
        if (speed > 0) {
          bus.position.z += 3.2 * delta * Math.max(1, speed / 70);
        }

        if (Math.abs(bus.position.x) > 25 || bus.position.z > 20) {
          scene.remove(bus);
          score += 10;
          scoreEl.textContent = score;
          return false;
        }

        const dx = bus.position.x - playerCar.position.x;
        const dz = bus.position.z - playerCar.position.z;
        if (Math.abs(dx) < 3.5 && Math.abs(dz) < 3.7) {
          endGame();
          return true;
        }

        return true;
      });
    }

    function endGame() {
      isGameOver = true;
      message.style.display = 'flex';
      message.textContent = 'נגמר! נקודות: ' + score + '  - לחץ הפעל כדי להתחיל מחדש';
      statusEl.textContent = 'נגמר';
    }

    function animate() {
      if (isGameOver) return;
      const delta = clock.getDelta();
      lastTime += delta;
      if (controls.accelerate) {
        speed = Math.min(220, speed + delta * 120);
      } else if (controls.decelerate) {
        speed = Math.max(0, speed - delta * 160);
      } else {
        speed = Math.max(0, speed - delta * 40);
      }
      speedEl.textContent = Math.round(speed);
      playerCar.position.x = THREE.MathUtils.lerp(playerCar.position.x, lanePositions[lane], delta * 7);
      playerCar.rotation.y = (playerCar.position.x - lanePositions[lane]) * 0.2;
      if (speed > 0) {
        updateRoad(delta);
        updateBuses(delta);
      }
      camera.position.set(playerCar.position.x, 6.2, playerCar.position.z + 20);
      camera.lookAt(new THREE.Vector3(playerCar.position.x, 1.2, playerCar.position.z + 6));
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
      
    }
  </script>
</body>
</html>
