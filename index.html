<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>משחק פרארי תלת-מימד</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0c1019;
      color: #fff;
    }
    #overlay {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 10;
      width: 280px;
      background: rgba(4, 11, 21, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      line-height: 1.5;
    }
    #overlay strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.05rem;
      color: #ffd24d;
    }
    #overlay span { display: block; margin: 4px 0; }
    #message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      padding: 24px 28px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 22px;
      text-align: center;
      display: none;
      max-width: 380px;
    }
    #message button {
      margin-top: 14px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #ff4444;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }
    canvas { display: block; }
    .error-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #090b10;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <strong>משחק פרארי תלת-מימד</strong>
    <span id="timer">זמן: 15.00</span>
    <span id="status">מטרה: הגעה לקו הסיום בתוך 15 שניות</span>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.12);margin:10px 0;">
    <span>W / חץ למעלה: תאוצה</span>
    <span>S / חץ למטה: בלימה לאחור</span>
    <span>A / חץ שמאל: לפנות שמאלה</span>
    <span>D / חץ ימין: לפנות ימינה</span>
    <span>R: איפוס לרכב</span>
  </div>
  <div id="message"><div id="messageText"></div><button id="restartButton">נסה שוב</button></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
  <script>
    if (!window.THREE) {
      document.body.innerHTML = '<div class="error-screen"><div><h1>שגיאה בטעינת THREE.js</h1><p>בדוק חיבור אינטרנט או נטע את הקובץ שוב.</p></div></div>';
      throw new Error('Three.js failed to load');
    }

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x07101f, 0.008);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 14, 26);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.HemisphereLight(0x99c6ff, 0x101020, 0.8);
    scene.add(ambientLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(12, 24, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.top = 40;
    sun.shadow.camera.bottom = -40;
    sun.shadow.camera.left = -40;
    sun.shadow.camera.right = 40;
    scene.add(sun);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(260, 260),
      new THREE.MeshStandardMaterial({ color: 0x07101f, roughness: 1, metalness: 0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const track = new THREE.Group();
    scene.add(track);

    const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x1d2f4d, roughness: 0.6, metalness: 0.1 });
    const stripeMaterial = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, emissive: 0xffffff, emissiveIntensity: 0.1 });

    function addRoad(width, length, x, z, rotation = 0) {
      const road = new THREE.Mesh(new THREE.BoxGeometry(width, 0.5, length), roadMaterial);
      road.position.set(x, 0.25, z);
      road.rotation.y = rotation;
      road.receiveShadow = true;
      track.add(road);
      return road;
    }

    function addStripe(width, length, x, z, rotation = 0) {
      const stripe = new THREE.Mesh(new THREE.BoxGeometry(width, 0.51, length), stripeMaterial);
      stripe.position.set(x, 0.26, z);
      stripe.rotation.y = rotation;
      stripe.receiveShadow = false;
      track.add(stripe);
      return stripe;
    }

    addRoad(12, 50, 0, 0);
    addStripe(0.5, 50, 0, 0);
    addRoad(12, 80, 0, -50);
    addStripe(0.5, 80, 0, -50);
    addRoad(12, 40, -15, -95, Math.PI / 2);
    addStripe(0.5, 40, -15, -95, Math.PI / 2);
    addRoad(12, 60, -15, -115);
    addStripe(0.5, 60, -15, -115);
    addRoad(12, 40, 15, -175, Math.PI / 2);
    addStripe(0.5, 40, 15, -175, Math.PI / 2);
    addRoad(12, 70, 15, -195);
    addStripe(0.5, 70, 15, -195);
    addRoad(12, 40, 0, -265, Math.PI / 2);
    addStripe(0.5, 40, 0, -265, Math.PI / 2);
    addRoad(12, 90, 0, -285);
    addStripe(0.5, 90, 0, -285);
    addRoad(12, 42, 15, -370, Math.PI / 2);
    addStripe(0.5, 42, 15, -370, Math.PI / 2);
    addRoad(12, 120, 15, -410);
    addStripe(0.5, 120, 15, -410);

    const finishLine = new THREE.Group();
    const finishBase = new THREE.Mesh(new THREE.BoxGeometry(12, 0.5, 4), new THREE.MeshStandardMaterial({ color: 0xffcc33, emissive: 0xffcc33, emissiveIntensity: 0.4 }));
    finishBase.position.set(15, 0.25, -480);
    finishBase.receiveShadow = true;
    finishLine.add(finishBase);

    for (let i = -1; i <= 1; i += 2) {
      const post = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 0.5), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.5 }));
      post.position.set(12 * i, 4.2, -484);
      post.castShadow = true;
      finishLine.add(post);
    }
    scene.add(finishLine);

    const finishRing = new THREE.Mesh(
      new THREE.TorusGeometry(6.5, 0.6, 16, 64),
      new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff4444, emissiveIntensity: 0.8 })
    );
    finishRing.position.set(15, 5.5, -484);
    finishRing.rotation.x = Math.PI / 2;
    scene.add(finishRing);

    const makeObstacle = (x, z) => {
      const cone = new THREE.Mesh(new THREE.ConeGeometry(1.2, 2.4, 12), new THREE.MeshStandardMaterial({ color: 0xff5511, roughness: 0.5, metalness: 0.1 }));
      cone.position.set(x, 1.2, z);
      cone.castShadow = true;
      scene.add(cone);
    };
    [[-3, -35], [3, -35], [-8, -110], [8, -230], [-3, -340], [3, -380], [-8, -450], [8, -470]].forEach(([x, z]) => makeObstacle(x, z));

    const car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1.1, 6), new THREE.MeshStandardMaterial({ color: 0xd90404, roughness: 0.3, metalness: 0.25 }));
    body.position.y = 1.1;
    body.castShadow = true;
    car.add(body);

    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.8, 2.8), new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.2 }));
    cockpit.position.set(0, 1.7, -0.3);
    cockpit.castShadow = true;
    car.add(cockpit);

    const hood = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.3, 2.4), new THREE.MeshStandardMaterial({ color: 0xb30000, roughness: 0.35, metalness: 0.2 }));
    hood.position.set(0, 1.45, 1.1);
    hood.castShadow = true;
    car.add(hood);

    const spoiler = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.18, 0.7), new THREE.MeshStandardMaterial({ color: 0x6f0000, roughness: 0.45, metalness: 0.2 }));
    spoiler.position.set(0, 1.45, 2.45);
    spoiler.castShadow = true;
    car.add(spoiler);

    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7, metalness: 0.4 });
    const wheelGeo = new THREE.CylinderGeometry(0.65, 0.65, 0.45, 16);
    for (let x of [-1.5, 1.5]) {
      for (let z of [2.2, -2.2]) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(x, 0.6, z);
        wheel.castShadow = true;
        car.add(wheel);
      }
    }

    car.position.set(0, 0, 10);
    car.rotation.y = Math.PI;
    car.traverse((child) => { if (child.isMesh) child.castShadow = true; });
    scene.add(car);

    const headlights = new THREE.PointLight(0xfff8d0, 0.9, 18, 2);
    headlights.position.set(-1.2, 1, -3.2);
    car.add(headlights);
    const headlights2 = new THREE.PointLight(0xfff8d0, 0.9, 18, 2);
    headlights2.position.set(1.2, 1, -3.2);
    car.add(headlights2);

    let speed = 0;
    let steering = 0;
    const keys = {};
    const maxSpeed = 2.1;
    const acceleration = 0.075;
    const brakePower = 0.09;
    const timeLimit = 15.0;
    let timeLeft = timeLimit;
    let finished = false;
    let failed = false;

    const timerDisplay = document.getElementById('timer');
    const statusDisplay = document.getElementById('status');
    const message = document.getElementById('message');
    const messageText = document.getElementById('messageText');
    const restartButton = document.getElementById('restartButton');

    window.addEventListener('keydown', (event) => {
      keys[event.key.toLowerCase()] = true;
      if (event.key.toLowerCase() === 'r') resetGame();
    });
    window.addEventListener('keyup', (event) => {
      keys[event.key.toLowerCase()] = false;
    });

    function resetGame() {
      car.position.set(0, 0, 10);
      car.rotation.y = Math.PI;
      speed = 0;
      steering = 0;
      timeLeft = timeLimit;
      finished = false;
      failed = false;
      message.style.display = 'none';
      statusDisplay.textContent = 'מטרה: הגעה לקו הסיום בתוך 15 שניות';
    }

    restartButton.addEventListener('click', resetGame);

    function updateCar() {
      const forward = keys['arrowup'] || keys['w'];
      const backward = keys['arrowdown'] || keys['s'];
      const left = keys['arrowleft'] || keys['a'];
      const right = keys['arrowright'] || keys['d'];

      if (forward) speed += acceleration;
      else if (backward) speed -= brakePower;
      else speed *= 0.96;

      speed = THREE.MathUtils.clamp(speed, -0.8, maxSpeed);

      if (left) steering = THREE.MathUtils.lerp(steering, 0.65, 0.09);
      else if (right) steering = THREE.MathUtils.lerp(steering, -0.65, 0.09);
      else steering = THREE.MathUtils.lerp(steering, 0, 0.08);

      car.rotation.y += steering * speed * 0.16;

      const forwardVec = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
      car.position.addScaledVector(forwardVec, speed);

      car.position.x = THREE.MathUtils.clamp(car.position.x, -26, 26);
      car.position.z = THREE.MathUtils.clamp(car.position.z, -490, 20);
    }

    function updateCamera() {
      const targetPos = car.position.clone().add(new THREE.Vector3(0, 8.5, 20).applyQuaternion(car.quaternion));
      camera.position.lerp(targetPos, 0.08);
      camera.lookAt(car.position.x, car.position.y + 1.7, car.position.z);
    }

    function showResult(text) {
      messageText.innerHTML = text;
      message.style.display = 'block';
    }

    function animate() {
      requestAnimationFrame(animate);
      if (!finished && !failed) {
        updateCar();
        const delta = Math.min(0.033, 1 / 60);
        timeLeft -= delta;

        if (timeLeft <= 0) {
          timeLeft = 0;
          failed = true;
          statusDisplay.textContent = 'נכשלת: הזמן נגמר';
          showResult('הזמן נגמר! לחץ על נתחיל שוב כדי לנסות שוב.');
        }

        if (car.position.distanceTo(finishRing.position) < 7 && car.position.z < -478) {
          finished = true;
          statusDisplay.textContent = 'ניצחת! סיימת בזמן';
          showResult('כל הכבוד! הגעת לקו הסיום בזמן.');
        }
      }

      timerDisplay.textContent = 'זמן: ' + timeLeft.toFixed(2);
      renderer.render(scene, camera);
      updateCamera();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetGame();
    animate();
  </script>
</body>
</html>
